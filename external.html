<!DOCTYPE html>
<html>
<head>
    <title>Factorial Calculator</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(135deg,#4facfe,#00f2fe);
        }

        .container{
            background:white;
            padding:30px;
            border-radius:15px;
            box-shadow:0 8px 20px rgba(0,0,0,0.2);
            text-align:center;
            width:350px;
        }

        h2{
            margin-bottom:20px;
            color:#333;
        }

        input{
            width:100%;
            padding:12px;
            border:2px solid #4facfe;
            border-radius:8px;
            font-size:16px;
            margin-bottom:15px;
            outline:none;
        }

        button{
            width:100%;
            padding:12px;
            border:none;
            border-radius:8px;
            background:#4facfe;
            color:white;
            font-size:16px;
            cursor:pointer;
            transition:0.3s;
        }

        button:hover{
            background:#008cff;
        }

        #result{
            margin-top:20px;
            font-size:20px;
            font-weight:bold;
            color:#222;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Factorial Calculator</h2>

        <input type="number" id="num" placeholder="Enter a number">

        <button onclick="calculateFactorial()">
            Calculate Factorial
        </button>

        <p id="result"></p>
    </div>

    <script>
        function calculateFactorial()
        {
            let num = document.getElementById("num").value;
            let fact = 1;

            for(let i = 1; i <= num; i++)
            {
                fact = fact * i;
            }

            document.getElementById("result").innerHTML =
            "Factorial = " + fact;
        }
    </script>

</body>
</html>
